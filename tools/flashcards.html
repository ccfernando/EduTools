<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards - EduTools</title>
    <script>
      (function() {
        try {
          const savedTheme = localStorage.getItem('theme');
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const theme = savedTheme || (prefersDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
        document.documentElement.classList.add('no-transitions');
      })();
    </script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="flashcards.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      [data-theme="dark"] { --background: #0f172a; --surface: #1e293b; --text-primary: #f1f5f9; --text-secondary: #94a3b8; --text-muted: #64748b; --border: #334155; }
      body { background: var(--background); color: var(--text-primary); }
      .sidebar { background: var(--surface); border-right-color: var(--border); }
      .top-header { background: var(--surface); border-bottom-color: var(--border); }
      .no-transitions *, .no-transitions .sidebar, .no-transitions .main-content { transition: none !important; }
      .sidebar.collapsed { width: 72px !important; }
      .sidebar.collapsed .logo { display: none; }
      .sidebar.collapsed .nav-item span, .sidebar.collapsed .user-info { display: none; }
      .sidebar.collapsed .nav-item { justify-content: center; }
      .sidebar.collapsed .user-profile { justify-content: center; }
      .main-content.collapsed { margin-left: 72px; }
    </style>
</head>
<body data-allowed-roles="admin">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                    <span>EduTools</span>
                </div>
                <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
            
            <nav class="sidebar-nav">
                <a href="../index.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"/>
                        <rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="timer.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12,6 12,12 16,14"/>
                    </svg>
                    <span>Timer</span>
                </a>
                <a href="flashcards.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                    <span>Flashcards</span>
                </a>
                <a href="students.html" class="nav-item" data-requires-role="admin">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    <span>Students</span>
                </a>
                <a href="settings.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    <span>Settings</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">AU</div>
                    <div class="user-info">
                        <div class="user-name">Account User</div>
                        <div class="user-role">Role</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1 class="page-title">Flashcards</h1>
                    <p class="page-subtitle">Create and study flashcards for oral exams</p>
                </div>
                <div class="header-actions">
                    <button class="action-btn" id="dark-mode-toggle" title="Toggle dark mode">
                        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"/>
                            <line x1="12" y1="1" x2="12" y2="3"/>
                            <line x1="12" y1="21" x2="12" y2="23"/>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                            <line x1="1" y1="12" x2="3" y2="12"/>
                            <line x1="21" y1="12" x2="23" y2="12"/>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                        </svg>
                        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                    </button>
                    <button class="action-btn" data-action="logout" title="Log out">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="tool-content">
                <div class="tabs">
                    <button class="tab active" data-tab="study">Study</button>
                    <button class="tab" data-tab="create">Create</button>
                    <button class="tab" data-tab="manage">Manage</button>
                </div>

                <div id="study-tab" class="tab-content">
                    <div class="study-mode">
                        <div class="deck-select">
                            <label for="deck-select">Select deck:</label>
                            <select id="deck-select"></select>
                        </div>
                        <div class="flashcard-container" id="flashcard">
                            <div class="flashcard-inner">
                                <div class="flashcard-front">
                                    <span class="card-number"></span>
                                    <div class="card-content"></div>
                                </div>
                                <div class="flashcard-back">
                                    <span class="card-number"></span>
                                    <div class="card-content"></div>
                                </div>
                            </div>
                        </div>
                        <div class="study-controls">
                            <button id="prev-card" class="btn navigation">← Previous</button>
                            <button id="flip-card" class="btn primary">Flip</button>
                            <button id="next-card" class="btn navigation">Next →</button>
                        </div>
                        <p class="study-progress"><span id="current-num">0</span> / <span id="total-num">0</span></p>
                    </div>
                </div>

                <div id="create-tab" class="tab-content hidden">
                    <div class="create-form">
                        <div class="form-row">
                            <input type="text" id="deck-name" placeholder="Deck name" required>
                            <button id="create-deck-btn" class="btn small">Create Deck</button>
                        </div>
                        <div class="card-form">
                            <h3>Add New Card</h3>
                            <textarea id="card-front" placeholder="Front (question/term)"></textarea>
                            <textarea id="card-back" placeholder="Back (answer/definition)"></textarea>
                            <button id="add-card-btn" class="btn primary">Add Card</button>
                        </div>
                    </div>
                </div>

                <div id="manage-tab" class="tab-content hidden">
                    <div class="manage-decks">
                        <div id="decks-list"></div>
                    </div>
                </div>
            </div>
        </main>
        <script>
          (function() {
            try {
              if (localStorage.getItem('sidebarCollapsed') === 'true') {
                var s = document.querySelector('.sidebar');
                var m = document.querySelector('.main-content');
                if (s) s.classList.add('collapsed');
                if (m) m.classList.add('collapsed');
              }
            } catch (e) {}
          })();
        </script>
    </div>
    <script src="../js/auth.js"></script>
    <script src="flashcards.js"></script>
    <script type="module" src="../js/theme.js"></script>
</body>
</html>
